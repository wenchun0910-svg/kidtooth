<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生潔牙記錄表</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // Tailwind 顏色配置
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cloud': '#FFFFFF', // 白雲底色
                        'sky-light': '#E4F4FB', // 天空藍底色
                        'title-blue': '#5C6D99', // 標題深藍色
                        'pill-blue': '#798CAE', // 小標籤藍色
                        'active-blue': '#52BEE8', // 潔牙完成的亮藍色
                        'sakura': '#E8B4B8',
                        'sakura-dark': '#C99A9D'
                    },
                    fontFamily: {
                        sans: ['"Iansui"', '"Noto Sans TC"', 'sans-serif'],
                        'bubbly': ['"Fredoka"', '"Iansui"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Iansui&display=swap');

        body {
            background-color: #E4F4FB; /* 圖片的淡藍色背景 */
            color: #5C6D99;
            font-family: "Iansui", sans-serif;
            overflow-x: hidden;
        }

        /* 標題白底裝飾 */
        .title-banner {
            background-color: #FFFFFF;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 4px 0 rgba(200, 225, 240, 0.5);
        }

        .student-btn {
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            -webkit-tap-highlight-color: transparent;
        }

        .student-btn.active {
            background-color: #52BEE8;
            color: white;
            transform: scale(1.15) rotate(-5deg);
            border-color: #52BEE8;
            box-shadow: 0 6px 12px -2px rgba(82, 190, 232, 0.5);
        }

        /* 隱藏預設捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 裝飾性浮動元素 */
        .floating-deco {
            position: absolute;
            z-index: 0;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body class="min-h-screen pb-24 relative">

    <!-- 裝飾元素 (模擬圖片中的可愛插圖) -->
    <div class="fixed top-10 left-4 sm:left-10 text-6xl floating-deco animate-bounce" style="animation-duration: 3s;">🪥</div>
    <div class="fixed top-10 right-4 sm:right-10 text-6xl floating-deco animate-pulse" style="animation-duration: 4s;">🦷✨</div>
    <div class="fixed bottom-4 left-4 sm:left-10 text-7xl floating-deco">🐱</div>
    <div class="fixed bottom-4 right-4 sm:right-10 text-7xl floating-deco">🐶</div>

    <!-- 頂部導航與操作列 -->
    <header class="relative z-10 pt-12 pb-6 px-4">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            
            <!-- 標題橫幅 -->
            <div class="title-banner w-full max-w-3xl py-6 px-4 text-center mt-6 relative border-4 border-white">
                <div class="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-pill-blue text-white px-6 py-2 rounded-2xl font-bubbly text-sm sm:text-base tracking-wider shadow-sm flex items-center gap-2 whitespace-nowrap">
                    <span class="w-3 h-3 bg-white/50 rounded-sm"></span>
                    健康好習慣
                </div>
                
                <h1 class="text-3xl sm:text-5xl font-bubbly font-bold text-title-blue tracking-wider mt-2 uppercase">
                    學生潔牙記錄表
                </h1>

                <!-- 控制項 -->
                <div class="mt-6 flex flex-wrap justify-center items-center gap-3 sm:gap-4">
                    <div class="flex items-center bg-sky-light rounded-full px-4 py-2 shadow-inner border border-white">
                        <label for="studentCountInput" class="text-sm sm:text-base font-bold text-title-blue mr-2 whitespace-nowrap">班級人數:</label>
                        <input type="number" id="studentCountInput" min="1" max="100" class="w-16 bg-transparent text-center font-bold text-title-blue focus:outline-none text-lg" value="30">
                    </div>

                    <!-- 開啟查詢頁框的按鈕 -->
                    <button id="openQueryBtn" class="bg-white hover:bg-sky-light text-title-blue px-6 py-2 rounded-full font-bold shadow-sm active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2 text-lg whitespace-nowrap border-2 border-sky-light">
                        🔍 歷史查詢
                    </button>

                    <button id="endRecordBtn" class="bg-[#FF9F43] hover:bg-[#FF8C1A] text-white px-8 py-2 rounded-full font-bold shadow-[0_4px_0_#D97014] active:shadow-[0_0px_0_#D97014] active:translate-y-1 transition-all flex items-center justify-center gap-2 text-lg whitespace-nowrap">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        結束記錄
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要區域：學生按鈕網格 -->
    <main class="max-w-4xl mx-auto px-4 py-4 relative z-10">
        <div class="bg-white/90 backdrop-blur-sm rounded-[30px] shadow-sm p-6 sm:p-8 border-4 border-white relative overflow-hidden">
            <div class="flex justify-between items-end mb-6 border-b-2 border-sky-light pb-4">
                <div>
                    <h2 class="text-xl font-bubbly font-bold text-title-blue flex items-center gap-2">
                        <span class="text-2xl">🪥</span>
                        今日打卡區
                    </h2>
                    <p class="text-sm text-title-blue/60 mt-1 font-bold" id="currentDateDisplay"></p>
                </div>
                <div class="text-right">
                    <span class="text-sm text-title-blue/60 font-bold">已完成：</span>
                    <span id="completedCount" class="text-3xl font-bubbly font-bold text-active-blue">0</span>
                    <span id="totalCountDisplay" class="text-sm text-title-blue/40 font-bold">/30</span>
                </div>
            </div>

            <!-- 學生按鈕容器 -->
            <div id="studentGrid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-8 gap-4 sm:gap-5 md:gap-6 justify-items-center">
                <!-- 按鈕由 JS 動態生成 -->
            </div>
        </div>
    </main>

    <!-- 右下角浮動：重置按鈕 -->
    <button id="resetBtn" class="fixed bottom-8 right-8 bg-white border-4 border-[#FFD166] text-[#FFD166] hover:bg-[#FFD166] hover:text-white w-16 h-16 rounded-full shadow-xl flex flex-col items-center justify-center transition-all duration-300 z-50 group">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mb-0.5 group-hover:-rotate-180 transition-transform duration-700"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        <span class="text-[10px] font-bold font-bubbly">重置</span>
    </button>

    <!-- 查詢專用頁框 (Query Modal) -->
    <div id="queryModal" class="fixed inset-0 bg-[#5C6D99]/60 backdrop-blur-sm z-[90] hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300 px-4 py-6">
        <div class="bg-white/95 backdrop-blur-md rounded-[30px] shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col transform scale-95 transition-transform duration-300 border-4 border-white relative overflow-hidden" id="queryModalContent">
            
            <!-- 關閉按鈕 -->
            <button id="closeQueryBtn" class="absolute top-4 right-4 z-10 text-title-blue/60 hover:text-sakura-dark text-3xl font-bold bg-sky-light hover:bg-[#FCE8E9] w-12 h-12 rounded-full flex items-center justify-center transition-colors shadow-sm">
                &times;
            </button>

            <!-- 標題與內容區 (可滾動) -->
            <div class="p-6 sm:p-8 overflow-y-auto no-scrollbar flex-1 mt-4 sm:mt-0">
                <h2 class="text-2xl font-bubbly font-bold text-title-blue mb-6 flex items-center gap-2">
                    <span class="text-3xl">🔍</span>
                    歷史資料查詢
                </h2>

                <!-- 頁籤切換 -->
                <div class="flex border-b-2 border-sky-light mb-6">
                    <button id="tabStudent" class="px-4 py-2 border-b-4 border-active-blue text-active-blue font-bold font-bubbly text-lg rounded-t-lg transition-colors">依座號查詢</button>
                    <button id="tabPeriod" class="px-4 py-2 border-b-4 border-transparent text-title-blue/40 hover:text-title-blue/80 font-bold font-bubbly text-lg rounded-t-lg transition-colors">依週期查詢</button>
                </div>

                <!-- 座號查詢面板 -->
                <div id="panelStudent" class="block">
                    <div class="flex items-center gap-3 mb-4">
                        <input type="number" id="queryStudentId" placeholder="輸入座號" class="border-2 border-sky-light rounded-xl px-4 py-2 w-32 focus:outline-none focus:border-active-blue text-center font-bold text-title-blue bg-white">
                        <button id="btnQueryStudent" class="bg-sky-light hover:bg-[#D0EBF7] text-title-blue font-bold px-6 py-2 rounded-xl transition-colors">查詢</button>
                    </div>
                    <div id="resultStudent" class="text-sm text-title-blue/80 bg-sky-light/50 p-4 rounded-2xl min-h-[100px] border-2 border-white font-bold flex items-center">
                        請輸入座號以查詢該生近期的潔牙記錄。
                    </div>
                </div>

                <!-- 週期查詢面板 -->
                <div id="panelPeriod" class="hidden">
                    <div class="flex flex-wrap items-center gap-3 mb-4">
                        <input type="date" id="queryStartDate" class="border-2 border-sky-light rounded-xl px-4 py-2 focus:outline-none focus:border-active-blue text-title-blue font-bold bg-white">
                        <span class="text-title-blue/40 font-bold">至</span>
                        <input type="date" id="queryEndDate" class="border-2 border-sky-light rounded-xl px-4 py-2 focus:outline-none focus:border-active-blue text-title-blue font-bold bg-white">
                        <button id="btnQueryPeriod" class="bg-sky-light hover:bg-[#D0EBF7] text-title-blue font-bold px-6 py-2 rounded-xl transition-colors">查詢</button>
                    </div>
                    <div id="resultPeriod" class="text-sm text-title-blue/80 bg-sky-light/50 p-4 rounded-2xl min-h-[100px] border-2 border-white font-bold">
                        請選擇日期區間以查詢班級紀錄。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 自訂提示框 Modal -->
    <div id="customModal" class="fixed inset-0 bg-[#5C6D99]/40 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center opacity-0 transition-opacity duration-300 px-4">
        <div class="bg-white rounded-[30px] shadow-2xl p-8 max-w-sm w-full transform scale-95 transition-transform duration-300 border-4 border-sky-light text-center" id="modalContent">
            <h3 id="modalTitle" class="text-2xl font-bubbly font-bold text-title-blue mb-4 flex items-center justify-center gap-2"></h3>
            <p id="modalMessage" class="text-title-blue/80 whitespace-pre-line leading-relaxed mb-8 font-bold"></p>
            <div class="flex justify-center">
                <button id="modalCloseBtn" class="bg-active-blue hover:bg-[#3FA9D4] text-white px-8 py-3 rounded-full font-bubbly font-bold text-lg shadow-[0_4px_0_#2B8CB5] active:shadow-[0_0px_0_#2B8CB5] active:translate-y-1 transition-all">太棒了 (OK)</button>
            </div>
        </div>
    </div>

    <!-- 邏輯控制腳本 -->
    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Global 變數
        window.db = null;
        window.user = null;
        window.appId = 'student-brushing-app'; 
        window.allRecords = []; 
        window.isOfflineMode = false; 

        // 📝 專屬 Firebase 設定
    const firebaseConfig = {
            apiKey: "AIzaSyBZHeBBnPXh3ATKY4GH_liNq_9AHJS3vMQ",
            authDomain: "kidtooth-23c63.firebaseapp.com",
            projectId: "kidtooth-23c63",
            storageBucket: "kidtooth-23c63.firebasestorage.app",
            messagingSenderId: "967363107437",
            appId: "1:967363107437:web:3a6e319362a9596793bd64"
        };


        // Firebase 初始化 (加入防重複連線保護機制)
        async function initFirebase() {
            try {
                // 防呆機制：如果已經初始化過，就取得舊有的，避免發生 already exists 錯誤
                let app;
                if (getApps().length === 0) {
                    app = initializeApp(firebaseConfig);
                } else {
                    app = getApp();
                }
                
                const auth = getAuth(app);
                window.db = getFirestore(app);

                await signInAnonymously(auth);

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        window.user = u;
                        loadRecordsFromFirebase();
                    }
                });
            } catch (error) {
                console.error("Firebase 連線錯誤:", error);
                let errorMsg = "無法連線至雲端資料庫，已暫時切換為單機模式。\n\n";
                if (error.code === 'auth/operation-not-allowed') {
                    errorMsg += "⚠️ 原因：Firebase 未啟用「匿名登入」。\n👉 請至 Authentication > Sign-in method 開啟。";
                } else if (error.message && error.message.includes("Missing or insufficient permissions")) {
                    errorMsg += "⚠️ 原因：資料庫權限未開放。\n👉 請至 Firestore Database > Rules 設定開放。";
                } else {
                    errorMsg += `⚠️ 原因：${error.message}`;
                }
                showModal("雲端連線失敗", errorMsg);
                enableOfflineMode();
            }
        }

        function enableOfflineMode() {
            window.isOfflineMode = true;
            loadRecordsFromFirebase();
        }

        // 讀取紀錄
        function loadRecordsFromFirebase() {
            if (window.isOfflineMode) {
                const localRecs = JSON.parse(localStorage.getItem('localBrushingRecords') || '{}');
                window.allRecords = Object.values(localRecs).sort((a, b) => new Date(b.date) - new Date(a.date));
                return;
            }

            if (!window.user || !window.db) return;
            
            const recordsRef = collection(window.db, 'artifacts', window.appId, 'users', window.user.uid, 'brushing_records');
            
            onSnapshot(recordsRef, (snapshot) => {
                window.allRecords = [];
                snapshot.forEach((docSnap) => {
                    window.allRecords.push(docSnap.data());
                });
                window.allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const panelPeriod = document.getElementById('panelPeriod');
                if (panelPeriod && !panelPeriod.classList.contains('hidden')) {
                    const start = document.getElementById('queryStartDate').value;
                    const end = document.getElementById('queryEndDate').value;
                    if (start && end) document.getElementById('btnQueryPeriod').click();
                }
            }, (error) => {
                console.error("獲取資料失敗:", error);
            });
        }

        // 儲存今日紀錄
        window.saveRecordToFirebase = async function(today, brushedArray, total) {
            const recordData = {
                date: today,
                brushed: brushedArray,
                total: total,
                timestamp: Date.now()
            };

            if (window.isOfflineMode) {
                let localRecs = JSON.parse(localStorage.getItem('localBrushingRecords') || '{}');
                localRecs[today] = recordData;
                localStorage.setItem('localBrushingRecords', JSON.stringify(localRecs));
                loadRecordsFromFirebase(); 
                showModal("儲存成功 (單機模式)", `今日 (${today}) 潔牙記錄已保存在此瀏覽器！\n完成人數：${brushedArray.length} / ${total}`);
                return;
            }

            if (!window.user || !window.db) return;

            try {
                const recordRef = doc(window.db, 'artifacts', window.appId, 'users', window.user.uid, 'brushing_records', today);
                await setDoc(recordRef, recordData);
                showModal("儲存成功", `今日 (${today}) 潔牙記錄已同步至雲端！\n完成人數：${brushedArray.length} / ${total}`);
            } catch (error) {
                console.error("儲存失敗:", error);
                let errorMsg = "無法儲存記錄，請確認網路狀態。\n";
                if(error.message && error.message.includes("Missing or insufficient permissions")) {
                    errorMsg = "⚠️ 儲存失敗：資料庫權限未開放！\n👉 請至 Firebase 設定 allow read, write: if true;";
                }
                showModal("儲存失敗", errorMsg);
            }
        };

        // 歷史紀錄修改
        window.toggleHistoryRecord = async function(dateStr, studentId) {
            let record = window.allRecords.find(r => r.date === dateStr);
            if (!record) return;
            
            let brushedSet = new Set(record.brushed);
            if (brushedSet.has(studentId)) {
                brushedSet.delete(studentId); 
            } else {
                brushedSet.add(studentId);    
            }
            record.brushed = Array.from(brushedSet).sort((a,b)=>a-b);
            
            if (window.isOfflineMode) {
                let localRecs = JSON.parse(localStorage.getItem('localBrushingRecords') || '{}');
                localRecs[dateStr] = record;
                localStorage.setItem('localBrushingRecords', JSON.stringify(localRecs));
                loadRecordsFromFirebase(); 
            } else if (window.db && window.user) {
                try {
                    const recordRef = doc(window.db, 'artifacts', window.appId, 'users', window.user.uid, 'brushing_records', dateStr);
                    await setDoc(recordRef, record);
                } catch (e) {
                    console.error("更新失敗", e);
                }
            }
            
            document.getElementById('btnQueryPeriod').click();
            
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            if (dateStr === todayStr && typeof window.syncTodayViewFromHistory === 'function') {
                window.syncTodayViewFromHistory(record.brushed);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const studentCountInput = document.getElementById('studentCountInput');
            const studentGrid = document.getElementById('studentGrid');
            const completedCount = document.getElementById('completedCount');
            const totalCountDisplay = document.getElementById('totalCountDisplay');
            const currentDateDisplay = document.getElementById('currentDateDisplay');
            const endRecordBtn = document.getElementById('endRecordBtn');
            const resetBtn = document.getElementById('resetBtn');
            
            const openQueryBtn = document.getElementById('openQueryBtn');
            const closeQueryBtn = document.getElementById('closeQueryBtn');
            const queryModal = document.getElementById('queryModal');
            const queryModalContent = document.getElementById('queryModalContent');
            const tabStudent = document.getElementById('tabStudent');
            const tabPeriod = document.getElementById('tabPeriod');
            const panelStudent = document.getElementById('panelStudent');
            const panelPeriod = document.getElementById('panelPeriod');
            
            let totalStudents = parseInt(localStorage.getItem('studentCount')) || 30;
            let brushedStudents = new Set();
            
            const today = new Date();
            currentDateDisplay.innerText = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
            
            window.syncTodayViewFromHistory = function(newBrushedArray) {
                brushedStudents = new Set(newBrushedArray);
                renderGrid();
            };

            init();

            function init() {
                studentCountInput.value = totalStudents;
                totalCountDisplay.innerText = `/${totalStudents}`;
                renderGrid();
            }

            studentCountInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > 100) val = 100;
                
                totalStudents = val;
                studentCountInput.value = val;
                localStorage.setItem('studentCount', val);
                totalCountDisplay.innerText = `/${val}`;
                
                const tempBrushed = new Set([...brushedStudents].filter(id => id <= val));
                brushedStudents = tempBrushed;
                renderGrid();
            });

            function renderGrid() {
                studentGrid.innerHTML = '';
                for (let i = 1; i <= totalStudents; i++) {
                    const btn = document.createElement('button');
                    const isActive = brushedStudents.has(i);
                    
                    btn.className = `student-btn w-16 h-16 sm:w-20 sm:h-20 rounded-full border-4 text-2xl sm:text-3xl font-bold flex items-center justify-center font-bubbly
                                     ${isActive ? 'active' : 'bg-white border-sky-light text-title-blue/40 hover:border-active-blue hover:text-active-blue'}`;
                    btn.innerText = i;
                    
                    btn.onclick = () => toggleStudent(i, btn);
                    studentGrid.appendChild(btn);
                }
                updateCounter();
            }

            function toggleStudent(id, btnElement) {
                if (brushedStudents.has(id)) {
                    brushedStudents.delete(id);
                    btnElement.classList.remove('active');
                    btnElement.className = `student-btn w-16 h-16 sm:w-20 sm:h-20 rounded-full border-4 text-2xl sm:text-3xl font-bold flex items-center justify-center font-bubbly bg-white border-sky-light text-title-blue/40 hover:border-active-blue hover:text-active-blue`;
                } else {
                    brushedStudents.add(id);
                    btnElement.className = `student-btn w-16 h-16 sm:w-20 sm:h-20 rounded-full border-4 text-2xl sm:text-3xl font-bold flex items-center justify-center font-bubbly active`;
                }
                updateCounter();
            }

            function updateCounter() {
                completedCount.innerText = brushedStudents.size;
            }

            endRecordBtn.addEventListener('click', () => {
                const now = new Date();
                const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; 
                const brushedArray = Array.from(brushedStudents).sort((a,b)=>a-b);
                window.saveRecordToFirebase(todayStr, brushedArray, totalStudents);
            });

            resetBtn.addEventListener('click', () => {
                brushedStudents.clear();
                studentCountInput.value = 30; 
                totalStudents = 30;
                localStorage.setItem('studentCount', 30);
                
                document.getElementById('queryStudentId').value = '';
                document.getElementById('queryStartDate').value = '';
                document.getElementById('queryEndDate').value = '';
                document.getElementById('resultStudent').innerHTML = '請輸入座號以查詢該生近期的潔牙記錄。';
                document.getElementById('resultPeriod').innerHTML = '請選擇日期區間以查詢班級紀錄。';

                init();
                showModal("已重置", "畫面上所有的資料已清除歸零。");
            });

            /* ==== 查詢頁框邏輯 ==== */
            openQueryBtn.addEventListener('click', () => {
                queryModal.classList.remove('hidden');
                queryModal.classList.add('flex');
                setTimeout(() => {
                    queryModal.classList.remove('opacity-0');
                    queryModalContent.classList.remove('scale-95');
                    queryModalContent.classList.add('scale-100');
                }, 10);
            });

            closeQueryBtn.addEventListener('click', () => {
                queryModal.classList.add('opacity-0');
                queryModalContent.classList.remove('scale-100');
                queryModalContent.classList.add('scale-95');
                setTimeout(() => {
                    queryModal.classList.add('hidden');
                    queryModal.classList.remove('flex');
                }, 300);
            });

            queryModal.addEventListener('click', (e) => {
                if (e.target === queryModal) {
                    closeQueryBtn.click();
                }
            });

            /* ==== 查詢功能邏輯 ==== */
            tabStudent.addEventListener('click', () => {
                tabStudent.classList.add('border-active-blue', 'text-active-blue');
                tabStudent.classList.remove('border-transparent', 'text-title-blue/40');
                tabPeriod.classList.remove('border-active-blue', 'text-active-blue');
                tabPeriod.classList.add('border-transparent', 'text-title-blue/40');
                panelStudent.classList.remove('hidden');
                panelPeriod.classList.add('hidden');
            });

            tabPeriod.addEventListener('click', () => {
                tabPeriod.classList.add('border-active-blue', 'text-active-blue');
                tabPeriod.classList.remove('border-transparent', 'text-title-blue/40');
                tabStudent.classList.remove('border-active-blue', 'text-active-blue');
                tabStudent.classList.add('border-transparent', 'text-title-blue/40');
                panelPeriod.classList.remove('hidden');
                panelStudent.classList.add('hidden');
            });

            document.getElementById('btnQueryStudent').addEventListener('click', () => {
                const id = parseInt(document.getElementById('queryStudentId').value);
                const resultDiv = document.getElementById('resultStudent');
                
                if (isNaN(id)) {
                    resultDiv.innerHTML = '<span class="text-sakura-dark font-bold">請輸入有效的座號！</span>';
                    return;
                }

                const matchedRecords = window.allRecords.filter(record => record.brushed && record.brushed.includes(id));
                
                if (matchedRecords.length === 0) {
                    resultDiv.innerHTML = `找不到座號 <span class="font-bold text-active-blue">${id}</span> 的潔牙紀錄。`;
                    return;
                }

                let html = `<div class="w-full"><p class="font-bold text-active-blue text-lg mb-3">座號 ${id} 的潔牙紀錄 (共 ${matchedRecords.length} 次)</p>`;
                html += '<ul class="space-y-2">';
                matchedRecords.forEach(r => {
                    html += `<li class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-sky-light">
                                <span class="text-lg">✨</span>
                                <span class="font-bold">${r.date}</span> 
                                <span class="text-sm text-title-blue/60 ml-auto">(班級完成度: ${r.brushed.length}/${r.total})</span>
                             </li>`;
                });
                html += '</ul></div>';
                resultDiv.innerHTML = html;
            });

            document.getElementById('btnQueryPeriod').addEventListener('click', () => {
                const start = document.getElementById('queryStartDate').value;
                const end = document.getElementById('queryEndDate').value;
                const resultDiv = document.getElementById('resultPeriod');

                if (!start || !end) {
                    resultDiv.innerHTML = '<span class="text-sakura-dark font-bold">請選擇完整的開始與結束日期！</span>';
                    return;
                }
                if (start > end) {
                    resultDiv.innerHTML = '<span class="text-sakura-dark font-bold">開始日期不能晚於結束日期！</span>';
                    return;
                }

                const matchedRecords = window.allRecords.filter(record => record.date >= start && record.date <= end);
                
                if (matchedRecords.length === 0) {
                    resultDiv.innerHTML = `在 ${start} 至 ${end} 期間無任何記錄。`;
                    return;
                }

                const totalDays = matchedRecords.length;
                let studentCounts = new Array(totalStudents + 1).fill(0);
                
                matchedRecords.forEach(r => {
                    if(r.brushed) {
                        r.brushed.forEach(id => {
                            if(id <= totalStudents) studentCounts[id]++;
                        });
                    }
                });

                let html = `<div class="w-full">`;
                
                html += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-4 border-sky-light mb-8 relative">
                        <h3 class="font-bubbly font-bold text-title-blue text-xl mb-4 flex items-center justify-center gap-2 bg-sky-light w-max mx-auto px-6 py-2 rounded-full absolute -top-5 left-1/2 transform -translate-x-1/2">
                            <span class="text-2xl">🏆</span> 期間潔牙次數總結 (共 ${totalDays} 天)
                        </h3>
                        <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 mt-4">
                `;

                for(let i = 1; i <= totalStudents; i++) {
                    const count = studentCounts[i];
                    const isPerfect = (count === totalDays && totalDays > 0);
                    const countColor = count === 0 ? 'text-sakura-dark' : 'text-active-blue';
                    const bgClass = isPerfect ? 'bg-[#FFF4D2] border-[#FFD166]' : 'bg-[#F9FCFE] border-sky-light/50';

                    html += `
                        <div class="relative ${bgClass} border-2 rounded-xl p-2 text-center shadow-sm flex flex-col justify-center items-center transition-all hover:-translate-y-1">
                            <span class="font-bubbly font-bold text-title-blue/60 text-sm mb-1">${i}號</span>
                            <span class="font-bold ${countColor} text-xl">${count} <span class="text-xs font-normal">次</span></span>
                            ${isPerfect ? '<span class="absolute -top-2 -right-2 text-2xl drop-shadow-md animate-bounce" style="animation-duration: 2s;">⭐</span>' : ''}
                        </div>
                    `;
                }

                html += `</div></div>`;

                html += `<p class="font-bold text-title-blue text-lg mb-4 flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-active-blue"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> 每日詳細紀錄 (點擊按鈕可直接修改)</p>`;
                html += '<div class="space-y-4">';
                
                matchedRecords.forEach(r => {
                    html += `<div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border-2 border-sky-light relative overflow-hidden">
                                <div class="font-bubbly font-bold text-title-blue text-lg mb-4 flex items-center justify-between border-b-2 border-sky-light pb-3">
                                    <span>📅 ${r.date}</span>
                                    <span class="text-sm bg-[#E4F4FB] px-3 py-1 rounded-full text-active-blue font-bold tracking-wide">已潔牙: ${r.brushed.length} / ${r.total}</span>
                                </div>
                                <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-8 gap-3 sm:gap-4 md:gap-5 justify-items-center">`;
                    
                    for(let i = 1; i <= r.total; i++) {
                        const isBrushed = r.brushed.includes(i);
                        const btnClass = isBrushed 
                            ? 'bg-active-blue text-white border-active-blue shadow-md transform scale-105 rotate-[-3deg]' 
                            : 'bg-white text-title-blue/40 border-sky-light hover:border-active-blue hover:text-active-blue';
                            
                        html += `<button onclick="toggleHistoryRecord('${r.date}', ${i})" class="w-12 h-12 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-full border-[3px] text-lg sm:text-xl md:text-2xl font-bold flex items-center justify-center font-bubbly transition-all duration-300 ${btnClass}">${i}</button>`;
                    }
                    
                    html += `   </div>
                             </div>`;
                });
                html += '</div></div>';
                resultDiv.innerHTML = html;
            });
        });

        function showModal(title, message) {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('modalContent');
            const titleEl = document.getElementById('modalTitle');
            const messageEl = document.getElementById('modalMessage');
            
            titleEl.innerHTML = title;
            messageEl.innerText = message;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        document.getElementById('modalCloseBtn').addEventListener('click', () => {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('modalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        });
        
        initFirebase();
    </script>
</body>
</html>
